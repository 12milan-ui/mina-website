    <style>
        :root{
            --mint:#B5EA5F; --mint-light:#E8F7EF; --mint-dark:#7EC89A;
            --blush:#F5DDD8; --pink:#EDCDC8; --cream:#FAF5EF; --nude:#E8D5C4;
            --lavender:#DDD8EE; --warm-grey:#C8C4BC; --charcoal:#3A3834;
            --black:#1A1818; --white:#FFFFFF; --text-main:#2A2826; --text-muted:#7A7672;

        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:var(--sans);background:var(--white);color:var(--text-main);overflow-x:hidden}

        nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(184,232,200,0.3);padding:0 4rem;height:72px;display:flex;align-items:center;justify-content:space-between}
        .nav-logo{font-family:var(--serif);font-size:2.2rem;font-weight:300;letter-spacing:0.2em;color:var(--black);cursor:pointer}
        .nav-logo span{color:var(--mint-dark)}
        .nav-links{display:flex;gap:2rem;list-style:none}
        .nav-links a{font-size:0.85rem;font-weight:500;color:var(--text-muted);text-decoration:none;letter-spacing:0.05em;transition:color 0.3s}
        .nav-links a:hover{color:var(--black)}
        .nav-right{display:flex;align-items:center;gap:1.2rem}
        .nav-icon{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text-muted);transition:all 0.3s;position:relative}
        .nav-icon:hover{color:var(--black)}
        .nav-badge{position:absolute;top:-5px;right:-5px;background:var(--mint-dark);color:var(--white);font-size:0.65rem;font-weight:600;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
        .nav-cart{background:var(--mint);border:none;cursor:pointer;font-size:0.8rem;font-weight:600;padding:0.6rem 1.4rem;border-radius:50px;color:var(--charcoal);transition:all 0.3s}
        .nav-cart:hover{background:var(--mint-dark);color:white}

        .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:72px}
        .hero-left{background:var(--cream);padding:5rem 4rem;display:flex;flex-direction:column;justify-content:center}
        .hero-title{font-family:var(--serif);font-size:4.8rem;font-weight:300;line-height:1.05;color:var(--black)}
        .hero-title em{font-style:italic;color:var(--mint-dark)}

        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2rem;padding:2rem 4rem}
        .product-card{cursor:pointer;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1)}
        .product-card:hover{transform:translateY(-12px)}
        .product-img-wrap{position:relative;overflow:hidden;border-radius:16px}
        .product-img{width:100%;height:360px;background-size:cover;background-position:center;transition:transform 0.6s ease}
        .product-card:hover .product-img{transform:scale(1.08)}

        .overlay{display:none;position:fixed;inset:0;background:rgba(26,24,24,0.75);z-index:200;align-items:center;justify-content:center;padding:1rem}
        .overlay.open{display:flex}
        .modal{background:var(--white);border-radius:24px;width:min(920px,95vw);max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 25px 70px rgba(0,0,0,0.15)}
        .modal-close{position:absolute;top:20px;right:20px;background:none;border:none;font-size:1.8rem;cursor:pointer}

        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--black);color:white;padding:14px 28px;border-radius:50px;font-size:0.95rem;z-index:1001;opacity:0;transition:all 0.4s}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}
        .toast.success{background:#3a7a50}

        .fade-up{opacity:0;transform:translateY(40px);transition:all 0.8s ease}
        .fade-up.visible{opacity:1;transform:translateY(0)}
    </style>
</head>

        <h1 class="hero-title">Where Nepal<br><em>Meets</em> the World</h1>

<div class="overlay" id="authOverlay" onclick="if(event.target===this)closeAuth()">

        <button class="modal-close" onclick="closeAuth()">✕</button>

            <h2 style="font-family:var(--serif);font-size:2.6rem;font-weight:300;text-align:center">Welcome to MINA</h2>
            <div style="display:flex;margin:2rem 0;border-bottom:2px solid #eee">

    <div class="modal" onclick="event.stopPropagation()" style="max-width:900px">

</div>

    <div class="modal" onclick="event.stopPropagation()" style="max-width:900px">

        <h2 style="text-align:center;font-family:var(--serif);font-size:2.4rem;margin:2rem 0">Checkout</h2>

            <div>

                <input type="text" id="firstName" placeholder="First Name" style="width:100%;padding:12px;margin-bottom:12px;border:1.5px solid #ddd;border-radius:12px">

            </div>
            <div>
                <h3 style="margin-bottom:1rem">Payment Method</h3>
                <div onclick="selectPayment(this,'esewa')" class="payment-option selected" style="padding:12px;border:2px solid var(--mint-dark);border-radius:12px;margin-bottom:12px;cursor:pointer">eSewa</div>
                <div onclick="selectPayment(this,'khalti')" class="payment-option" style="padding:12px;border:2px solid #ddd;border-radius:12px;margin-bottom:12px;cursor:pointer">Khalti</div>
                <div onclick="selectPayment(this,'cod')" class="payment-option" style="padding:12px;border:2px solid #ddd;border-radius:12px;cursor:pointer">Cash on Delivery</div>
                <div style="margin-top:2rem">
                    <strong>Total: <span id="checkoutTotal">NPR 0</span></strong>
                </div>
                <button onclick="placeOrder()" style="width:100%;margin-top:1.5rem;background:var(--mint);color:var(--black);padding:16px;border:none;border-radius:50px;font-weight:700;cursor:pointer">Place Order</button>
            </div>
        </div>

</div>

<script>
// ==================== YOUR REAL FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyCGStS6wAzpk_x7sY4_zx-WDnJEY5yrNIA",
    authDomain: "mina-marketplace.firebaseapp.com",
    projectId: "mina-marketplace",
    storageBucket: "mina-marketplace.firebasestorage.app",
    messagingSenderId: "790888437540",
    appId: "1:790888437540:web:d800c8249c876f264785b1",
    measurementId: "G-2S3GGEMW76"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ==================== PRODUCTS WITH ORIGINAL IMAGE PATHS ====================
let allProducts = [
  {id:1,name:'Dhaka Silk Saree',category:'Nepali Heritage',price:4800,oldPrice:6000,badge:'sale',img:'./images/dhaka-silk-saree.jpg',stars:5,reviews:128,stock:12,desc:'Handwoven Dhaka silk saree from Palpa',sizes:['Free'],colors:['#c0534a']},
  {id:2,name:'Velvet Anarkali Kurta',category:'Kurtas',price:3200,badge:'new',img:'./images/velvet-anarkali-kurta.jpg',stars:5,reviews:89,stock:8,desc:'Luxurious velvet Anarkali kurta',sizes:['XS','S','M','L','XL'],colors:['#8b6b9e']},
  {id:3,name:'Mint Linen Co-ord Set',category:'Western',price:2850,badge:'hot',img:'./images/mint-linen-coord.jpg',stars:4,reviews:64,stock:15,desc:'Comfortable linen co-ord set',sizes:['S','M','L','XL'],colors:['#B5EA5F']},
  {id:4,name:'Block Heel Sandals',category:'Footwear',price:2200,oldPrice:2800,badge:'sale',img:'./images/block-heel-sandals.jpg',stars:5,reviews:211,stock:20,desc:'Comfortable block heel sandals',sizes:['36','37','38','39'],colors:['#2A2826']},
  {id:5,name:'Gunyo Cholo Set',category:'Nepali Heritage',price:5500,badge:'new',img:'./images/gunyo-cholo-set.jpg',stars:5,reviews:47,stock:5,desc:'Traditional Gunyo Cholo set',sizes:['Free'],colors:['#c0534a']},
  {id:6,name:'Floral Maxi Dress',category:'Western',price:2600,img:'./images/floral-maxi-dress.jpg',stars:4,reviews:93,stock:18,desc:'Flowing floral maxi dress',sizes:['XS','S','M','L'],colors:['#EDCDC8']},
  {id:7,name:'Allo Fabric Shawl',category:'Nepali Heritage',price:1800,badge:'new',img:'./images/allo-fabric-shawl.jpg',stars:5,reviews:156,stock:25,desc:'Eco-friendly Allo fabric shawl',sizes:['Free'],colors:['#4a8b6b']},
  {id:8,name:'Platform Sneakers',category:'Footwear',price:3500,img:'./images/platform-sneakers.jpg',stars:4,reviews:77,stock:12,desc:'Trendy platform sneakers',sizes:['36','37','38','39'],colors:['#FFFFFF']},
  {id:9,name:'Slim-Fit Joggers',category:'Activewear',price:1650,badge:'hot',img:'./images/slim-fit-joggers.jpg',stars:5,reviews:204,stock:30,desc:'Comfortable slim-fit joggers',sizes:['XS','S','M','L'],colors:['#2A2826']},
  {id:10,name:'Sports Bra',category:'Activewear',price:950,img:'./images/sports-bra.jpg',stars:5,reviews:312,stock:50,desc:'High-support sports bra',sizes:['XS','S','M','L'],colors:['#B5EA5F']},
  {id:11,name:'Satin Scrunchie Set',category:'Accessories',price:350,badge:'new',img:'./images/satin-scrunchie-set.jpg',stars:5,reviews:430,stock:100,desc:'Set of 5 satin scrunchies',sizes:['One Size'],colors:['#EDCDC8']},
  {id:12,name:'Beaded Tote Bag',category:'Accessories',price:1900,badge:'hot',img:'./images/beaded-tote-bag.jpg',stars:4,reviews:99,stock:10,desc:'Handmade beaded tote bag',sizes:['One Size'],colors:['#E8D5C4']}
];

let filteredProducts = [...allProducts];
let cart = JSON.parse(localStorage.getItem('minaCart')) || [];
let currentUser = null;
let selectedProduct = null;
let authMode = 'login';

// Render Products
function renderProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = filteredProducts.map(p => `
        <div class="product-card fade-up" onclick="openProductModal(${p.id})">
            <div class="product-img-wrap">
                <div class="product-img" style="background-image:url('${p.img}')"></div>
                ${p.badge ? `<span style="position:absolute;top:12px;left:12px;padding:6px 14px;border-radius:30px;font-size:0.75rem;color:white;background:${p.badge==='sale'?'#c0534a':p.badge==='new'?'#7EC89A':'#3A3834'}">${p.badge.toUpperCase()}</span>` : ''}
            </div>
            <div style="padding:1rem">
                <div style="font-family:var(--serif);font-size:1.1rem">${p.name}</div>
                <div style="color:var(--text-muted)">${p.category}</div>
                <div style="font-weight:600;margin-top:8px">NPR ${p.price.toLocaleString()}</div>
            </div>
        </div>
    `).join('');
    
    setTimeout(() => document.querySelectorAll('.fade-up').forEach(el => el.classList.add('visible')), 100);
}

// Cart Functions
function updateCart() {
    document.getElementById('cartBtn').textContent = `Bag (${cart.length})`;
    const itemsDiv = document.getElementById('cartItems');
    let total = 0;

    if (cart.length === 0) {
        itemsDiv.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:3rem">Your bag is empty</p>';
        document.getElementById('cartTotalSection').style.display = 'none';
        return;
    }

    itemsDiv.innerHTML = cart.map((item, i) => {
        const qty = item.quantity || 1;
        total += item.price * qty;
        return `
            <div style="display:flex;gap:1rem;margin-bottom:1.5rem;border-bottom:1px solid #eee;padding-bottom:1rem">
                <div style="width:70px;height:90px;background:url('${item.img}') center/cover;border-radius:8px"></div>
                <div style="flex:1">
                    <div style="font-weight:500">${item.name}</div>
                    <div style="color:var(--text-muted)">NPR ${item.price}</div>
                    <div style="margin-top:8px">
                        <button onclick="changeQty(${i}, -1)" style="width:28px;height:28px;border:1px solid #ddd">-</button>
                        <span style="margin:0 12px">${qty}</span>
                        <button onclick="changeQty(${i}, 1)" style="width:28px;height:28px;border:1px solid #ddd">+</button>
                    </div>
                </div>
                <button onclick="removeFromCart(${i})" style="background:none;border:none;color:#c0534a;cursor:pointer;align-self:start">Remove</button>
            </div>
        `;
    }).join('');

    document.getElementById('cartTotal').textContent = `NPR ${total.toLocaleString()}`;
    document.getElementById('cartTotalSection').style.display = 'block';
}

function changeQty(index, delta) {
    cart[index].quantity = (cart[index].quantity || 1) + delta;
    if (cart[index].quantity < 1) cart[index].quantity = 1;
    localStorage.setItem('minaCart', JSON.stringify(cart));
    updateCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    localStorage.setItem('minaCart', JSON.stringify(cart));
    updateCart();
    showToast('Item removed');
}

function addToCartFromModal() {
    if (!selectedProduct) return;
    cart.push({...selectedProduct, quantity: 1});
    localStorage.setItem('minaCart', JSON.stringify(cart));
    updateCart();
    closeProductModal();
    showToast('Added to bag!', 'success');
}

// Open Cart
function openCart() {
    document.getElementById('cartOverlay').classList.add('open');
    document.getElementById('cartSidebar').style.transform = 'translateX(0)';
    updateCart();
}

function closeCart() {
    document.getElementById('cartOverlay').classList.remove('open');
    document.getElementById('cartSidebar').style.transform = 'translateX(100%)';
}

// Product Modal
function openProductModal(id) {
    selectedProduct = allProducts.find(p => p.id === id);
    if (!selectedProduct) return;

    document.getElementById('modalImg').style.backgroundImage = `url('${selectedProduct.img}')`;
    document.getElementById('modalCategory').textContent = selectedProduct.category;
    document.getElementById('modalName').textContent = selectedProduct.name;
    document.getElementById('modalPrice').innerHTML = `NPR ${selectedProduct.price.toLocaleString()}`;
    document.getElementById('modalDesc').textContent = selectedProduct.desc;

    document.getElementById('productModal').classList.add('open');
}

function closeProductModal() {
    document.getElementById('productModal').classList.remove('open');
}

// Checkout
function openCheckout() {
    if (cart.length === 0) return showToast('Your cart is empty');
    const total = cart.reduce((sum, item) => sum + item.price * (item.quantity || 1), 0);
    document.getElementById('checkoutTotal').textContent = `NPR ${total.toLocaleString()}`;
    document.getElementById('checkoutOverlay').classList.add('open');
}

function closeCheckout() {
    document.getElementById('checkoutOverlay').classList.remove('open');
}

function selectPayment(el, method) {
    document.querySelectorAll('.payment-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
}

function placeOrder() {
    showToast('Order placed successfully! 🎉 Thank you for shopping with MINA', 'success');
    cart = [];
    localStorage.setItem('minaCart', JSON.stringify(cart));
    updateCart();
    closeCheckout();
}

// Auth Functions
function openAuth() {
    document.getElementById('authOverlay').classList.add('open');
}

function closeAuth() {
    document.getElementById('authOverlay').classList.remove('open');
}

function switchAuthTab(mode) {
    authMode = mode;
    document.getElementById('nameField').style.display = mode === 'signup' ? 'block' : 'none';
}

async function handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const name = document.getElementById('authName').value || '';

    const btn = document.getElementById('authSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Processing...';

    try {
        if (authMode === 'signup') {
            const result = await auth.createUserWithEmailAndPassword(email, password);
            await result.user.updateProfile({displayName: name});
            showToast('Account created successfully! Welcome to MINA', 'success');
        } else {
            await auth.signInWithEmailAndPassword(email, password);
            showToast('Signed in successfully!', 'success');
        }
        closeAuth();
    } catch (error) {
        document.getElementById('authError').textContent = error.message;
        document.getElementById('authError').style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
    }
}

function updateUserUI() {
    const btn = document.getElementById('userBtn');
    if (currentUser) {
        const initial = (currentUser.displayName || currentUser.email || 'U')[0].toUpperCase();
        btn.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:var(--mint-light);display:flex;align-items:center;justify-content:center;color:var(--mint-dark);font-weight:600">${initial}</div>`;
    }
}

function openWishlist() {
    showToast('Wishlist feature coming soon');
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show', type);
    setTimeout(() => toast.classList.remove('show', type), 2800);
}

// Initialize
window.addEventListener('DOMContentLoaded', () => {
    renderProducts();
    updateCart();
    showToast('Welcome to MINA ✨', 'success');
});
</script>
</body>
</html>
